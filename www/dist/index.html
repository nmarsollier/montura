<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Monturita</title>
    <style>/* ═══════════════════════════════════════════════════
   Monturita — Velvet Dark Theme
   Paleta: negro, gris oscuro, rojo velvet
   ═══════════════════════════════════════════════════ */

:root {
    --bg:            #080808;
    --panel:         #111111;
    --panel-raised:  #181818;
    --border:        #251010;
    --accent:        #8b1a1a;
    --accent-bright: #b52222;
    --accent-glow:   #3d0808;
    --text:          #ebebeb;
    --text-dim:      #8a7a7a;
    --text-title:    #e8c0c0;
    --text-accent:   #d48080;
    --btn-bg:        #1c0d0d;
    --btn-hover:     #3d1515;
    --btn-active:    #5a1a1a;
    --input-bg:      #0d0d0d;
    --input-border:  #2a1515;
    --shadow:        0 4px 24px rgba(0, 0, 0, .7);
}

* { box-sizing: border-box; }

body {
    font-family: 'Inter', system-ui, -apple-system, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════
   Layout
   ═══════════════════════════════════════════════════ */

.app {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px 16px 40px;
}

/* ═══════════════════════════════════════════════════
   Header
   ═══════════════════════════════════════════════════ */

.header {
    text-align: center;
    padding: 28px 16px 20px;
    margin-bottom: 16px;
}

.header-brand {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text-title);
    text-shadow: 0 0 40px var(--accent-glow), 0 2px 4px rgba(0,0,0,.8);
    margin: 0;
}

.header-brand span {
    color: var(--accent-bright);
}

.header-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
}

.header-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 14px auto 0;
    border: none;
}

/* ═══════════════════════════════════════════════════
   Panels
   ═══════════════════════════════════════════════════ */

.panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    transition: border-color .2s;
}

.panel:hover {
    border-color: #351515;
}

.panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
}

.panel-header strong {
    color: var(--text-title);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .6px;
}

.panel-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-bright);
    box-shadow: 0 0 8px var(--accent-bright);
}

/* ═══════════════════════════════════════════════════
   Status bar
   ═══════════════════════════════════════════════════ */

.status-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
}

.status-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .4px;
    background: var(--btn-bg);
    color: var(--text-accent);
    border: 1px solid var(--accent);
}

.coords {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--text);
    letter-spacing: .3px;
}

.coords-label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
}

.info-row {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-dim);
}

.info-row span {
    color: var(--text);
}

/* ═══════════════════════════════════════════════════
   Grid
   ═══════════════════════════════════════════════════ */

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* ═══════════════════════════════════════════════════
   Buttons
   ═══════════════════════════════════════════════════ */

.row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
}

button {
    background: var(--btn-bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: .3px;
    transition: all .15s ease;
}

button:hover {
    background: var(--btn-hover);
    border-color: var(--accent);
    color: #fff;
}

button:active {
    background: var(--btn-active);
}

button.danger {
    background: #200a0a;
    border-color: #4a1515;
    color: var(--text-accent);
}

button.danger:hover {
    background: #3d1010;
    border-color: var(--accent-bright);
    color: #f08080;
}

button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
}

button.primary:hover {
    background: var(--accent-bright);
    border-color: var(--accent-bright);
    box-shadow: 0 0 16px var(--accent-glow);
}

/* ═══════════════════════════════════════════════════
   Manual Slew — two-column layout, centered
   ═══════════════════════════════════════════════════ */

.slew-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: center;
    justify-items: center;
    max-width: 520px;
    margin: 0 auto;
}

/* Left column: Grados + Velocidad (label-left, input-right) */

.slew-controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
}

.slew-field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.slew-field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 70px;
    text-align: right;
}

.slew-field-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

.slew-hint {
    font-size: 11px;
    color: var(--text-dim);
}

.slew-field input,
.slew-field select {
    width: 90px;
}

/* Right column: directional pad */

.slew-pad {
    display: flex;
    justify-content: center;
}

.dir-grid {
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 48px 48px 48px;
    align-items: center;
    justify-items: center;
    gap: 4px;
}

.dir-grid button {
    width: 48px;
    height: 42px;
    font-size: 18px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

.dir-grid .center-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: .6px;
}

/* ═══════════════════════════════════════════════════
   Settings — time + location
   ═══════════════════════════════════════════════════ */

.settings-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.settings-row:last-child {
    margin-bottom: 0;
}

.settings-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    min-width: 80px;
}

.settings-value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--text);
    flex: 1;
}

.settings-fields {
    display: flex;
    gap: 6px;
}

.settings-input {
    width: 72px;
}

.settings-input-short {
    width: 56px;
}

/* ═══════════════════════════════════════════════════
   GOTO — 3-field coordinate inputs + bottom-aligned button
   ═══════════════════════════════════════════════════ */

/* Three-field H:M:S or D:M:S row */
.coord-fields {
    display: flex;
    align-items: center;
    gap: 2px;
}

.coord-fields input {
    width: 52px;
    text-align: center;
    padding: 8px 4px;
    font-variant-numeric: tabular-nums;
}

.coord-sep {
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    user-select: none;
}

/* Right column: push GOTO button to the bottom */
.goto-btn-col {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
}

.goto-btn-col button {
    min-width: 80px;
    padding: 14px 24px;
    font-size: 16px;
}

@media (max-width: 500px) {
    .slew-layout {
        grid-template-columns: 1fr;
        gap: 16px;
        max-width: 100%;
    }
    .slew-pad {
        order: -1;
    }
}

/* ═══════════════════════════════════════════════════
   Inputs
   ═══════════════════════════════════════════════════ */

select, input {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--input-border);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color .15s;
    outline: none;
}

select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
}

select {
    cursor: pointer;
}

input::placeholder {
    color: #4a3a3a;
}

/* ═══════════════════════════════════════════════════
   WiFi warning
   ═══════════════════════════════════════════════════ */

.wifi-warning {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    background: #1a0a0a;
    border: 1px solid #4a2020;
    color: var(--text-accent);
    font-size: 13px;
}

.wifi-warning::before {
    content: '⚠ ';
}

/* ═══════════════════════════════════════════════════
   Error banner
   ═══════════════════════════════════════════════════ */

.error-banner {
    margin: 0 auto 12px;
    max-width: 880px;
    padding: 12px 18px;
    border-radius: 10px;
    background: #1a0a0a;
    border: 1px solid var(--accent);
    color: var(--text-accent);
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    box-shadow: 0 0 20px var(--accent-glow);
}

/* ═══════════════════════════════════════════════════
   Footer
   ═══════════════════════════════════════════════════ */

footer {
    text-align: center;
    font-size: 11px;
    color: #332525;
    margin-top: 20px;
    letter-spacing: .5px;
}

footer code {
    color: #4a3535;
    background: #0d0d0d;
    padding: 1px 6px;
    border-radius: 4px;
}

/* ═══════════════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════════════ */

@media (max-width: 600px) {
    .grid {
        grid-template-columns: 1fr;
    }
    .header-brand {
        font-size: 26px;
    }
    .app {
        padding: 12px 8px 30px;
    }
    .panel {
        padding: 14px;
    }
}
</style>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body>
<div class="app" x-data="mountApp()">

    <!-- ═══ Header ═══ -->
    <div class="header">
        <h1 class="header-brand"><span>Monturita</span></h1>
        <div class="header-sub">Non precision instruments Inc.</div>
        <hr class="header-line">
    </div>

    <!-- ═══ Status ═══ -->
    <div class="panel">
        <div class="status-row">
            <span class="status-badge" x-text="statusText"></span>
            <div style="flex:1"></div>
            <span class="coords"><span class="coords-label">RA</span> <span x-text="status.ra"></span></span>
            <span class="coords"><span class="coords-label">DEC</span> <span x-text="status.dec"></span></span>
        </div>
        <div class="info-row">
            <div>Tracking <span x-text="serverTracking"></span></div>
            <div>Lat <span x-text="settings.lat"></span></div>
            <div>Lon <span x-text="settings.lon"></span></div>
            <div>Elev <span x-text="settings.elevation"></span> m</div>
        </div>
    </div>

    <!-- ═══ Site & Time ═══ -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-dot"></div>
            <strong>Configuración</strong>
        </div>

        <!-- Time row -->
        <div class="settings-row">
            <span class="settings-label">Fecha y hora</span>
            <span class="settings-value" x-text="mountTime">--</span>
            <button @click="updateTime()">Actualizar hora</button>
        </div>

        <!-- Location row -->
        <div class="settings-row">
            <span class="settings-label">Ubicación</span>
            <span class="settings-fields">
                <input type="text" inputmode="decimal" placeholder="Lat"
                       x-model.number="settings.lat" class="settings-input" title="Latitud">
                <input type="text" inputmode="decimal" placeholder="Lon"
                       x-model.number="settings.lon" class="settings-input" title="Longitud">
                <input type="text" inputmode="numeric" placeholder="Elev"
                       x-model.number="settings.elevation" class="settings-input settings-input-short"
                       title="Elevación (m)">
            </span>
            <button @click="updateSettings()">Actualizar</button>
        </div>
    </div>

    <!-- ═══ Actions + Tracking ═══ -->
    <div class="grid">
        <div class="panel">
            <div class="panel-header">
                <div class="panel-dot"></div>
                <strong>Acciones</strong>
            </div>
            <div class="row">
                <button class="danger" @click="stop()">STOP</button>
                <button @click="home()">HOME</button>
                <button @click="park()">PARK</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-dot"></div>
                <strong>Tracking</strong>
            </div>
            <div class="row">
                <select x-model.number="selectedTracking">
                    <template x-for="(m, i) in trackingOptions" :key="i">
                        <option :value="i" x-text="m"></option>
                    </template>
                </select>
                <button class="primary" @click="setTracking()">Set</button>
            </div>
        </div>
    </div>

    <!-- ═══ Manual Slew ═══ -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-dot"></div>
            <strong>Manual Slew</strong>
        </div>

        <div class="slew-layout">
            <!-- Left: Grados + Velocidad -->
            <div class="slew-controls">
                <div class="slew-field">
                    <label>Grados (1–90°)</label>
                    <div class="slew-field-row">
                        <input type="text" inputmode="decimal" x-model.number="slew.degrees">
                    </div>
                </div>

                <div class="slew-field">
                    <label>Velocidad</label>
                    <select x-model.number="slew.speed">
                        <option value="1">1×</option>
                        <option value="2">2×</option>
                        <option value="3">3×</option>
                        <option value="4">4×</option>
                    </select>
                </div>
            </div>

            <!-- Right: Directional pad -->
            <div class="slew-pad">
                <div class="dir-grid">
                    <div></div>
                    <button @click="doSlew('ra', 1)" title="RA +">▲</button>
                    <div></div>
                    <button @click="doSlew('dec', -1)" title="DEC −">◀</button>
                    <div class="center-cell">RA·DEC</div>
                    <button @click="doSlew('dec', 1)" title="DEC +">▶</button>
                    <div></div>
                    <button @click="doSlew('ra', -1)" title="RA −">▼</button>
                    <div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ GOTO ═══ -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-dot"></div>
            <strong>GOTO</strong>
        </div>

        <div class="slew-layout">
            <!-- Left: RA + DEC + Speed -->
            <div class="slew-controls">
                <div class="slew-field">
                    <label>RA</label>
                    <div class="coord-fields">
                        <input type="text" inputmode="numeric" placeholder="HH" x-model.number="goto.ra.h">
                        <span class="coord-sep">:</span>
                        <input type="text" inputmode="numeric" placeholder="MM" x-model.number="goto.ra.m">
                        <span class="coord-sep">:</span>
                        <input type="text" inputmode="decimal" placeholder="SS" x-model.number="goto.ra.s">
                    </div>
                </div>

                <div class="slew-field">
                    <label>DEC</label>
                    <div class="coord-fields">
                        <input type="text" inputmode="decimal" placeholder="±DD" x-model.number="goto.dec.d">
                        <span class="coord-sep">:</span>
                        <input type="text" inputmode="numeric" placeholder="MM" x-model.number="goto.dec.m">
                        <span class="coord-sep">:</span>
                        <input type="text" inputmode="decimal" placeholder="SS" x-model.number="goto.dec.s">
                    </div>
                </div>

                <div class="slew-field">
                    <label>Velocidad</label>
                    <select x-model.number="goto.speed">
                        <option value="1">1×</option>
                        <option value="2">2×</option>
                        <option value="3">3×</option>
                        <option value="4">4×</option>
                    </select>
                </div>
            </div>

            <!-- Right: GOTO button (bottom-aligned) -->
            <div class="goto-btn-col">
                <button class="primary" @click="doGoto()">GOTO</button>
            </div>
        </div>
    </div>

    <!-- ═══ WiFi Setup ═══ -->
    <div class="panel" x-show="wifiAp">
        <div class="panel-header">
            <div class="panel-dot"></div>
            <strong>Configuración Wi-Fi</strong>
        </div>
        <div class="row">
            <input placeholder="SSID" x-model="wifi.ssid">
            <input placeholder="Password" x-model="wifi.password" type="password">
            <button class="primary"
                    @click="apiPost('/api/wifi-config', {ssid: wifi.ssid, password: wifi.password}).then(() => fetchStatus())">
                Conectar
            </button>
        </div>
        <div class="wifi-warning">La red no está configurada. Conectar ahora para salir del modo AP.</div>
    </div>

    <!-- ═══ Error banner ═══ -->
    <div class="error-banner" x-show="errorMessage" x-text="errorMessage"
         x-transition.opacity.duration.200ms></div>

    <!-- ═══ Footer ═══ -->
    <footer>Monturita · SPA embebida · REST <code>/api/*</code></footer>

</div>

<script>function mountApp() {
    return {
        status: {ra: '--:--:--', dec: '--:--:--'},
        statusText: 'UNKNOWN',
        settings: {lat: 0, lon: 0, elevation: 0},
        mountTime: '--',
        timeAutoSet: false,
        errorMessage: '',
        errorTimer: null,
        slew: {degrees: 5, speed: 4},
        wifi: {ssid: '', password: ''},
        goto: {ra: {h: 0, m: 0, s: 0}, dec: {d: 0, m: 0, s: 0}, speed: 4},
        serverTracking: 'none',
        wifiAp: false,
        selectedTracking: null,
        trackingOptions: ['none', 'sidereal', 'lunar', 'solar'],

        /* Show an error message for 5 seconds, then auto-clear. */
        showError(msg) {
            this.errorMessage = msg;
            if (this.errorTimer) clearTimeout(this.errorTimer);
            this.errorTimer = setTimeout(() => { this.errorMessage = ''; }, 5000);
        },

        /* Helper: POST JSON, parse response, show errors automatically. */
        apiPost(url, body) {
            return fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            }).then(r => r.json()).then(j => {
                if (!j.ok) this.showError(j.message || 'Error desconocido');
                return j;
            }).catch(e => {
                this.showError('Red o servidor no disponible');
                throw e;
            });
        },

        fetchStatus() {
            fetch('/api/status').then(r => r.json()).then(j => {
                this.statusText = j.status || 'UNKNOWN';
                this.status = {ra: j.ra || '--:--:--', dec: j.dec || '--:--:--'};
                this.mountTime = j.time || '--';
                this.serverTracking = j.tracking || 'none';
                this.wifiAp = j.wifi_ap || false;

                const s = j.settings;
                if (s) {
                    this.settings.lat = s.lat != null ? s.lat : 0;
                    this.settings.lon = s.lon != null ? s.lon : 0;
                    this.settings.elevation = s.elevation != null ? s.elevation : 0;
                }

                if (!this.timeAutoSet && j.time && j.time < '2000-01-01') {
                    this.timeAutoSet = true;
                    this.updateTime();
                }

                if (this.selectedTracking === null) {
                    const idx = this.trackingOptions.indexOf(j.tracking);
                    this.selectedTracking = idx >= 0 ? idx : 0;
                }
            }).catch(() => {});
        },

        stop()  { this.apiPost('/api/stop').then(() => this.fetchStatus()); },
        home()  { this.apiPost('/api/home').then(() => this.fetchStatus()); },
        park()  { this.apiPost('/api/park').then(() => this.fetchStatus()); },

        setTracking() {
            this.apiPost('/api/tracking', {tracking: this.trackingOptions[this.selectedTracking]})
                .then(() => this.fetchStatus());
        },

        doSlew(axis, dir) {
            const axisName = axis === 'ra' ? 'ra' : 'dec';
            const deg = Math.min(90, Math.max(1, Math.round(Math.abs(this.slew.degrees || 5))));
            const spd = this.slew.speed || 4;
            this.apiPost('/api/move-axis', {axis: axisName, degrees: dir * deg, speed: spd})
                .then(() => this.fetchStatus());
        },

        doGoto() {
            const rh = this.goto.ra.h;
            const rm = this.goto.ra.m;
            const rs = this.goto.ra.s;
            const dd = this.goto.dec.d;
            const dm = this.goto.dec.m;
            const ds = this.goto.dec.s;

            if (isNaN(rh) || rh < 0 || rh > 23 || isNaN(rm) || rm < 0 || rm > 59 || isNaN(rs) || rs < 0 || rs >= 60) {
                this.showError('RA inválida — H: 0–23, M: 0–59, S: 0–59.999');
                return;
            }
            if (isNaN(dd) || dd < -90 || dd > 90 || isNaN(dm) || dm < 0 || dm > 59 || isNaN(ds) || ds < 0 || ds >= 60) {
                this.showError('DEC inválida — D: −90…+90, M: 0–59, S: 0–59.999');
                return;
            }

            const raHours = rh + rm / 60 + rs / 3600;
            const absDec = Math.abs(dd) + dm / 60 + ds / 3600;
            const decDeg = dd < 0 ? -absDec : absDec;

            this.apiPost('/api/goto', {ra: raHours, dec: decDeg, speed: this.goto.speed})
                .then(() => this.fetchStatus());
        },

        updateTime() {
            const now = new Date().toISOString();
            this.apiPost('/api/settings', {
                time: now,
                lat: this.settings.lat || 0,
                lon: this.settings.lon || 0,
                elevation: this.settings.elevation || 0
            }).then(() => this.fetchStatus());
        },

        updateSettings() {
            this.apiPost('/api/settings', {
                lat: this.settings.lat || 0,
                lon: this.settings.lon || 0,
                elevation: this.settings.elevation || 0
            }).then(() => this.fetchStatus());
        },

        init() {
            this.fetchStatus();
            setInterval(() => this.fetchStatus(), 1000);
        }
    }
}

window.addEventListener('load', () => {
    setTimeout(() => {
        const root = document.querySelector('[x-data]');
        if (root && root.__x) root.__x.$data.init();
    }, 500);
});
</script>
